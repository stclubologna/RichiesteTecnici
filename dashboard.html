<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Service - Storico Ordini</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen">
    <nav>
        <div class="max-w-6xl mx-auto flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center">
            <span class="font-bold text-xl uppercase tracking-widest" style="color:var(--blue-700)">Service Control</span>
            <div style="display:flex;gap:1rem">
                <a href="index.html">Nuova Prenotazione</a>
                <a href="dashboard.html" class="font-bold">Storico</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4">
        <div class="search-row">
            <input type="text" id="ricercaEvento" onkeyup="filtraEventi()" 
                   placeholder="Cerca per nome evento o responsabile..." 
                   class="form-control">
            <button onclick="caricaStorico()" class="icon-btn" title="Ricarica storico">🔄</button>
        </div>

        <div id="loading" class="loading">Caricamento storico...</div>
        <div id="grigliaEventi">
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxg7wupK_fuC8uCjKoWNBlFlhxpvxhTXwG1cbQPurD8guNawu89_ZF6FeNOx2_o9kE_/exec";
        let tuttiGliEventi = [];

        async function caricaStorico() {
            const griglia = document.getElementById('grigliaEventi');
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            griglia.innerHTML = "";

            try {
                const res = await fetch(API_URL);
                tuttiGliEventi = await res.json();
                renderizzaEventi(tuttiGliEventi);
            } catch (e) {
                alert("Errore nel caricamento dei dati");
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderizzaEventi(eventi) {
            const griglia = document.getElementById('grigliaEventi');
            griglia.innerHTML = eventi.map(ev => `
                <div class="card">
                    <div>
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
                            <span class="id-badge">${ev.id_evento}</span>
                            <span class="price">€${ev.totale ? ev.totale.toFixed(2) : '0'}</span>
                        </div>
                        <h3 class="ev-title">${ev.nome_evento}</h3>
                        <p class="ev-meta">Resp: ${ev.responsabile} | Facoltà: ${ev.facolta}</p>
                        <div class="ev-small" style="margin-bottom:1rem">
                            <p>📅 Consegna: ${new Date(ev.consegna_materiale).toLocaleDateString()}</p>
                            <p>📅 Rientro: ${new Date(ev.rientro_materiale).toLocaleDateString()}</p>
                            <p>📦 Materiale: <span class="italic text-slate-300">${ev.dettaglio_materiale || 'Nessuna nota'}</span></p>
                        </div>
                    </div>
                    <button onclick="eliminaEvento('${ev.id_evento}')" class="btn btn-danger" style="width:100%">ELIMINA ORDINE</button>
                </div>
            `).join('');
        }

/*        function renderizzaEventi(eventi) {
    console.log("Dati ricevuti:", eventi[0]); // Questo ti permette di vedere i nomi dei campi nella console F12
    const griglia = document.getElementById('grigliaEventi');
    griglia.innerHTML = eventi.map(ev => `
        <div class="bg-slate-800 ...">
            <p>📦 Debug: <span class="text-xs text-red-400">${JSON.stringify(ev)}</span></p>
        </div>
    `).join('');
}
*/
        function filtraEventi() {
            const query = document.getElementById('ricercaEvento').value.toLowerCase();
            const filtrati = tuttiGliEventi.filter(ev => 
                ev.nome_evento.toLowerCase().includes(query) || 
                ev.responsabile.toLowerCase().includes(query)
            );
            renderizzaEventi(filtrati);
        }

        async function eliminaEvento(id) {
            if(!confirm(`Sei sicuro di voler eliminare l'evento ${id}?`)) return;
            
            try {
                await fetch(`${API_URL}?deleteId=${id}`);
                alert("Evento eliminato correttamente dal foglio!");
                caricaStorico(); // Ricarica la lista
            } catch (e) {
                alert("Errore durante l'eliminazione");
            }
        }

        // Carica all'avvio
        window.onload = caricaStorico;
    </script>
</body>
</html>
